<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}برنامه ریزی من {% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav>
        <a href="{% url 'plan_list' %}">برنامه من</a>
        <a href="{% url 'dashboard' %}">وضعیت</a>
        <a href="{% url 'plan_create' %}">برنامه جدید</a>
        {% if user.is_authenticated %}
            <span style="margin-right:auto;">{{ user.username }}</span>
            <a href="{% url 'logout' %}">خروج</a>
        {% else %}
            <a href="{% url 'login' %}">ورود</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
{% block scripts %}
{% endblock %}
</html>
